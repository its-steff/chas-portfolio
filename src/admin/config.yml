backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "Homepage"
    label: "Homepage"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "src/_data/home.yml"
        fields:
          - { label: "Hero Name", name: "hero_name", widget: "string" }
          - { label: "Hero Tagline", name: "hero_tagline", widget: "string" }
          - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
          - { label: "Intro", name: "intro", widget: "markdown" }
          - { label: "CTA Text", name: "cta_text", widget: "string" }
          - { label: "Gallery title", name: "gallery_title", widget: "string" }
          - { label: "Gallery Intro", name: "gallery_intro", widget: "markdown" }
          - { label: "Event Title", name: "event_title", widget: "string" }
          - {label: "Blog Post Title", name: "blog_post_title", widget: "string" }

  - name: "site"
    label: "Site Settings"
    files:
      - label: "Global"
        name: "global"
        file: "src/_data/settings.yml"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string" }
          - { label: "Logo Text", name: "logo_text", widget: "string" }
          - { label: "Language Label", name: "language_label", widget: "string", required: false }
          - { label: "View all link", name: "view_all_link", widget: "string", required: false }
      - label: "Footer"
        name: "footer"
        file: "src/_data/site.yml"
        fields:
          - { label: "Footer Copyright Text", name: "footer_copyright", widget: "string" }
          - {
              label: "Social Intro Text",
              name: "social_intro_text",
              widget: "string",
              required: false,
            }
          - { label: "Instagram URL", name: "instagram_url", widget: "string", required: false }
          - { label: "Tumblr URL", name: "tumblr_url", widget: "string", required: false }
          - { label: "Bluesky URL", name: "bluesky_url", widget: "string", required: false }

  - name: "navigation_pages"
    label: "Navigation Pages"
    label_singular: "Page"
    folder: "src/content/pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Cover Image", name: "cover_image", widget: "image", required: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "published_books"
    label: "Published Books"
    label_singular: "Book"
    folder: "src/content/books"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Cover Image", name: "cover_image", widget: "image", required: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Store Link", name: "store_link", widget: "string", required: false }
      - { label: "CTA Text", name: "cta_text", widget: "string" }
      - {
          label: "Publication Year",
          name: "publication_year",
          widget: "string",
          hint: "Use YYYY (example: 2024)",
          pattern: ["^[0-9]{4}$", "Please use a 4-digit year (YYYY)."],
        }

  - name: "events"
    label: "Events"
    label_singular: "Event"
    folder: "src/content/events"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "blog_posts"
    label: "Blog Posts"
    label_singular: "Post"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
